interface:
  display_name: "Cocos Asset Pipeline Director"
  short_description: "Direct Cocos assets through MCP workflows"
  default_prompt: "Use $cocos-asset-pipeline-director to plan, generate, validate, and import Cocos Creator assets with the configured asset forge MCP."

dependencies:
  tools:
    - type: "mcp"
      value: "cocos_asset_forge"
      description: "Cocos Asset Forge MCP for sprites, sprite sheets, tilesets, UI packs, and Cocos-ready asset metadata."
